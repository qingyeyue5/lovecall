<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LoveCall 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --rose:    #e8a0b4;
    --blush:   #f2c4ce;
    --deep:    #1a0a10;
    --mid:     #2d1520;
    --surface: rgba(255,255,255,0.06);
    --border:  rgba(232,160,180,0.25);
    --glow:    rgba(232,160,180,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: var(--deep);
    color: #f0dde4;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* animated gradient background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,40,70,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(80,20,50,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 55% 45%, rgba(160,60,100,0.2) 0%, transparent 55%);
    animation: bgpulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgpulse {
    0%   { opacity: 0.8; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.04); }
  }

  /* floating particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .p {
    position: absolute; border-radius: 50%;
    background: var(--rose); opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ── LOBBY ── */
  #lobby { gap: 32px; }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 4.2rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: #f7e0e8;
    text-shadow: 0 0 40px rgba(232,160,180,0.5);
    animation: logofade 1.2s ease forwards;
  }
  .logo span { font-style: italic; color: var(--rose); }
  @keyframes logofade {
    from { opacity:0; transform: translateY(-16px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .tagline {
    font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(232,160,180,0.6); margin-top: -20px;
    animation: logofade 1.2s 0.3s ease both;
  }

  .card {
    background: var(--surface);
    backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 16px;
    animation: logofade 1.2s 0.5s ease both;
    box-shadow: 0 8px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .card label {
    font-size: 0.72rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--rose); margin-bottom: 4px;
  }

  .input-group { display: flex; flex-direction: column; gap: 6px; }

  input[type=text] {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #f0dde4;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    width: 100%;
  }
  input[type=text]::placeholder { color: rgba(240,221,228,0.3); }
  input[type=text]:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .row { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    padding: 13px 20px;
    border-radius: 12px;
    border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, #c0516e 0%, #e8789a 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(192,81,110,0.45);
  }
  .btn-primary:hover { box-shadow: 0 6px 28px rgba(192,81,110,0.65); }
  .btn-secondary {
    background: rgba(255,255,255,0.07);
    color: var(--blush);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    color: rgba(240,221,228,0.25); font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }

  .room-display {
    background: rgba(232,160,180,0.08);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem; color: var(--blush);
    letter-spacing: 0.06em; text-align: center;
    word-break: break-all;
  }

  /* ── CALL SCREEN ── */
  #callscreen {
    padding: 0; background: #0d0608;
    flex-direction: column;
    justify-content: flex-end;
  }

  #remoteVideo {
    position: absolute; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #0d0608;
    transition: opacity 0.5s;
  }

  #localVideo {
    position: absolute;
    bottom: 100px; right: 20px;
    z-index: 20;
    width: clamp(100px, 28vw, 150px);
    aspect-ratio: 3/4;
    border-radius: 16px;
    object-fit: cover;
    border: 2px solid rgba(232,160,180,0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: scaleX(-1);
    transition: all 0.3s;
  }
  #localVideo:hover { transform: scaleX(-1) scale(1.04); }

  .call-overlay {
    position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: linear-gradient(to top, rgba(10,3,7,0.9) 0%, transparent 40%);
  }

  .call-controls {
    position: relative; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    gap: 20px;
    padding: 20px 20px 36px;
  }

  .ctrl-btn {
    width: 56px; height: 56px;
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    transition: transform 0.15s, box-shadow 0.2s;
    backdrop-filter: blur(8px);
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn.normal {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
  }
  .ctrl-btn.normal:hover { background: rgba(255,255,255,0.2); }
  .ctrl-btn.end {
    background: linear-gradient(135deg, #c0516e, #e8789a);
    box-shadow: 0 4px 20px rgba(192,81,110,0.5);
    color: #fff; width: 66px; height: 66px; font-size: 1.5rem;
  }
  .ctrl-btn.end:hover { box-shadow: 0 6px 28px rgba(192,81,110,0.7); }
  .ctrl-btn.muted { background: rgba(232,160,180,0.35); }

  .status-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(10,3,7,0.7), transparent);
  }
  .status-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 300; color: #f0dde4;
  }
  .status-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: rgba(240,221,228,0.6);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6fcf97; animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(111,207,151,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 5px rgba(111,207,151,0); }
  }

  /* connecting state */
  .connecting-overlay {
    position: absolute; inset: 0; z-index: 25;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    background: rgba(10,3,7,0.88);
    backdrop-filter: blur(6px);
    transition: opacity 0.5s;
  }
  .connecting-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--rose);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .connecting-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-style: italic;
    color: var(--blush);
  }

  /* toast */
  #toast {
    position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
    z-index: 100; padding: 10px 20px;
    background: rgba(20,8,14,0.9); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 30px;
    color: var(--blush); font-size: 0.82rem; letter-spacing: 0.05em;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* copy btn for room id */
  .copy-wrap { display: flex; gap: 8px; align-items: center; }
  .copy-wrap .room-display { flex: 1; text-align: left; }
  .copy-icon-btn {
    flex-shrink: 0;
    background: rgba(232,160,180,0.12);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--rose);
    cursor: pointer; padding: 8px 10px;
    font-size: 1rem; transition: background 0.2s;
  }
  .copy-icon-btn:hover { background: rgba(232,160,180,0.22); }

  /* info text */
  .info { font-size: 0.75rem; color: rgba(240,221,228,0.4); line-height: 1.6; text-align: center; }
  .info a { color: var(--rose); text-decoration: none; }
  .info strong { color: rgba(240,221,228,0.65); }

  /* options */
  .checkline {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 0.74rem; color: rgba(240,221,228,0.52); line-height: 1.45;
    cursor: pointer; user-select: none;
  }
  .checkline input { margin-top: 2px; accent-color: var(--rose); }
  .tiny-note { font-size: 0.68rem; color: rgba(240,221,228,0.35); text-align: center; line-height: 1.45; }



  /* answer code panel on call screen */
  .answer-call-panel {
    position: absolute;
    left: 14px;
    right: 14px;
    top: 72px;
    z-index: 60;
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(20,8,14,0.92);
    border: 1px solid var(--border);
    box-shadow: 0 10px 36px rgba(0,0,0,0.45);
    backdrop-filter: blur(14px);
  }
  .answer-call-panel.open { display: flex; }
  .answer-call-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--blush);
    font-size: 0.86rem;
    line-height: 1.45;
  }
  .answer-call-title strong { color: #fff; }
  .answer-call-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.08);
    color: var(--blush);
    cursor: pointer;
    flex-shrink: 0;
  }
  #answerCallText {
    width: 100%;
    min-height: 82px;
    max-height: 130px;
    resize: vertical;
    border-radius: 12px;
    border: 1px dashed var(--border);
    background: rgba(255,255,255,0.06);
    color: #f0dde4;
    padding: 10px 12px;
    font-size: 0.72rem;
    line-height: 1.45;
    word-break: break-all;
    outline: none;
  }
  .answer-call-actions { display: flex; gap: 10px; align-items: center; }
  .answer-call-actions .btn { padding: 10px 14px; font-size: 0.82rem; }
  .answer-call-hint { font-size: 0.72rem; color: rgba(240,221,228,0.52); line-height: 1.45; }

  /* chat */
  .chat-panel {
    position: absolute; left: 14px; right: 14px; bottom: 122px; z-index: 36;
    max-height: 42vh; min-height: 160px;
    display: none; flex-direction: column; overflow: hidden;
    background: rgba(20,8,14,0.78); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 18px;
    box-shadow: 0 10px 38px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .chat-panel.open { display: flex; }
  .chat-head {
    padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
    color: var(--blush); font-size: 0.82rem; border-bottom: 1px solid rgba(232,160,180,0.14);
  }
  .chat-close {
    background: transparent; border: none; color: var(--blush); font-size: 1.2rem; cursor: pointer;
  }
  .chat-messages {
    flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
  }
  .chat-msg {
    max-width: 78%; padding: 8px 11px; border-radius: 14px;
    font-size: 0.86rem; line-height: 1.35; word-break: break-word;
    background: rgba(255,255,255,0.09); color: #f4dfe7; align-self: flex-start;
  }
  .chat-msg.me {
    align-self: flex-end; background: rgba(232,160,180,0.24); color: #fff;
  }
  .chat-msg.system {
    align-self: center; max-width: 90%; background: transparent;
    color: rgba(240,221,228,0.46); font-size: 0.74rem; padding: 2px 0;
  }
  .chat-input-row {
    display: flex; gap: 8px; padding: 10px; border-top: 1px solid rgba(232,160,180,0.14);
  }
  #chatInput {
    flex: 1; background: rgba(255,255,255,0.07); border: 1px solid var(--border);
    border-radius: 12px; color: #f0dde4; padding: 10px 12px; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  }
  #chatSendBtn {
    flex: 0 0 64px; padding: 10px 12px; border-radius: 12px;
  }
  #chatBadge {
    position: absolute; top: 7px; right: 8px; width: 8px; height: 8px;
    border-radius: 50%; background: #ff8ca8; display: none;
    box-shadow: 0 0 0 3px rgba(255,140,168,0.20);
  }
  #chatBadge.show { display: block; }

  @media (max-width: 420px) {
    .call-controls { gap: 11px; padding-bottom: 28px; }
    .ctrl-btn { width: 49px; height: 49px; font-size: 1.08rem; }
    .ctrl-btn.end { width: 58px; height: 58px; font-size: 1.25rem; }
    #localVideo { bottom: 90px; right: 12px; width: 112px; }
    .chat-panel { bottom: 104px; left: 10px; right: 10px; }
  }

</style>
</head>
<body>

<!-- particles -->
<div class="particles" id="particles"></div>

<!-- LOBBY -->
<div class="screen" id="lobby">
  <div class="logo">Love<span>Call</span></div>
  <p class="tagline">私密 · 点对点 · 无服务器 · v6</p>

  <div class="card">
    <div class="input-group">
      <label>你的昵称</label>
      <input type="text" id="myName" placeholder="例如：宝贝" maxlength="20">
    </div>

    <!-- STEP 0: 选角色 -->
    <div id="step0" style="display:flex; flex-direction:column; gap:10px;">
      <div class="divider">你是哪一方？</div>
      <div class="row">
        <button class="btn btn-primary" id="createBtn">📤 我来发邀请</button>
        <button class="btn btn-secondary" id="joinStartBtn">📥 我收到邀请</button>
      </div>
      <p class="info">两人各开这个页面。一人点「发邀请」，生成一段码发给对方；对方粘贴后生成「确认码」发回；再粘贴一次即可通话。</p>
      <label class="checkline"><input type="checkbox" id="compatMode"> 兼容网络模式：只有连不上时再勾选，两边都重新来一次；它更稳，但邀请码/确认码会变长。</label>
      <p class="tiny-note">默认是短码优先 + 一次性双人锁房；通话建立后会拒绝第二个确认码。</p>
    </div>

    <!-- STEP 1 (主机): 复制邀请码 -->
    <div id="step1host" style="display:none; flex-direction:column; gap:12px;">
      <label>① 复制下面的「邀请码」，用微信/短信发给对方 👇</label>
      <div class="copy-wrap">
        <div class="room-display" id="offerText" style="font-size:0.7rem; max-height:80px; overflow:auto; text-align:left; word-break:break-all;">生成中…</div>
        <button class="copy-icon-btn" id="copyOfferBtn" title="复制">⧉</button>
      </div>
      <p class="tiny-note" id="offerLen">正在计算长度…</p>
      <label>② 对方发回「确认码」后，粘贴到这里 👇</label>
      <textarea id="answerInput" placeholder="粘贴对方的确认码…"
        style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;
               color:#f0dde4;font-family:'DM Sans',sans-serif;font-size:0.82rem;
               padding:10px 14px;outline:none;resize:vertical;min-height:70px;width:100%;"></textarea>
      <button class="btn btn-primary" id="connectBtn">🔗 建立通话</button>
    </div>

    <!-- STEP 1 (接入方): 粘贴邀请码 -->
    <div id="step1joiner" style="display:none; flex-direction:column; gap:12px;">
      <label>① 把对方发来的「邀请码」粘贴到这里 👇</label>
      <textarea id="offerInput" placeholder="粘贴邀请码…"
        style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;
               color:#f0dde4;font-family:'DM Sans',sans-serif;font-size:0.82rem;
               padding:10px 14px;outline:none;resize:vertical;min-height:70px;width:100%;"></textarea>
      <button class="btn btn-primary" id="genAnswerBtn">⚡ 生成确认码</button>
      <div id="answerArea" style="display:none; flex-direction:column; gap:10px;">
        <label>② 复制下面的「确认码」发回给对方 👇</label>
        <div class="copy-wrap">
          <div class="room-display" id="answerText" style="font-size:0.7rem; max-height:80px; overflow:auto; text-align:left; word-break:break-all;"></div>
          <button class="copy-icon-btn" id="copyAnswerBtn" title="复制">⧉</button>
        </div>
        <p class="tiny-note" id="answerLen">正在计算长度…</p>
        <button class="btn btn-primary" id="waitAfterAnswerBtn">✅ 我已把确认码发给对方，进入等待通话</button>
        <button class="btn btn-secondary" id="regenAnswerBtn">↻ 重新生成确认码</button>
        <p class="info" style="color:rgba(240,221,228,0.55);">先复制确认码发回给发起方。发完后再点上面的按钮进入等待通话。</p>
      </div>
    </div>
  </div>
</div>

<!-- CALL SCREEN -->
<div class="screen hidden" id="callscreen">
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo"  autoplay playsinline muted></video>
  <video id="beautySource" autoplay playsinline muted style="display:none"></video>
  <canvas id="beautyCanvas" style="display:none"></canvas>
  <div class="call-overlay"></div>

  <div class="connecting-overlay" id="connectingOverlay">
    <div class="spinner"></div>
    <div class="connecting-text" id="connectingMsg">正在连接…</div>
    <!-- 接入方：在通话画面内也能复制确认码 -->
    <button class="btn btn-secondary" id="copyAnswerCallBtn"
      style="display:none; margin-top:8px; max-width:260px; font-size:0.82rem;">
      ⧉ 复制确认码（再发给对方一次）
    </button>
  </div>

  <div class="status-bar">
    <span class="status-name" id="peerNameDisplay">对方</span>
    <span class="status-dot"><span class="dot"></span> <span id="callTimer">00:00</span></span>
  </div>



  <div class="answer-call-panel" id="answerCallPanel">
    <div class="answer-call-title">
      <span><strong>确认码已生成。</strong>先复制下面这段，发回给发起方；发起方粘贴后才会真正接通。</span>
      <button class="answer-call-close" id="answerCallCloseBtn" title="收起">×</button>
    </div>
    <textarea id="answerCallText" readonly placeholder="确认码生成后会出现在这里"></textarea>
    <div class="answer-call-actions">
      <button class="btn btn-primary" id="answerCallCopyBtn">⧉ 复制确认码</button>
      <button class="btn btn-secondary" id="answerCallSelectBtn">手动选中</button>
    </div>
    <div class="answer-call-hint" id="answerCallHint">如果 iPhone 没自动复制，点“手动选中”后长按文字复制。</div>
  </div>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-head"><span>💬 文字聊天</span><button class="chat-close" id="chatCloseBtn" title="关闭">×</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 18; i++) {

  p.className = 'p';

    width:${size}px; height:${size}px;

  `;

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function toast(msg, duration = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════
//  SHOW / HIDE SCREENS
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════
//  SIGNALING: Manual SDP Exchange + short code + lock + chat
//  无需服务器、无需 API Key。
//  默认短码优先；连不上时勾选“兼容网络模式”重试。
// ═══════════════════════════════════════════════════════

const ICE_SERVERS_SHORT = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' },
];

const ICE_SERVERS_COMPAT = [
  ...ICE_SERVERS_SHORT,
  { urls: 'turn:openrelay.metered.ca:80',   username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443',  username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let pc = null;
let rawStream = null;
let localStream = null;
let callStartTime = null;
let timerInterval = null;
let muted = false;
let camOff = false;
let hostSessionId = null;
let joinSessionId = null;
let answerAlreadyUsed = false;
let pendingAnswerCode = '';
let currentRole = '';
let waitingForHostPaste = false;
let chatChannel = null;
let unreadChat = 0;
let beautyEnabled = false;
let beautyVideoTrack = null;
let beautyFrame = null;

// ─── HELPERS ─────────────────────────────────────────
function getName() {
  return document.getElementById('myName').value.trim() || '宝贝';
}

function randomId(len = 18) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, n => chars[n % chars.length]).join('');
}

function getIceServers() {
  return document.getElementById('compatMode')?.checked ? ICE_SERVERS_COMPAT : ICE_SERVERS_SHORT;
}

function cleanCode(str) {
  return (str || '').trim().replace(/\s+/g, '');
}

function encode(obj) {
  const json = JSON.stringify(obj);
  if (window.LZString) {
    return 'LC1.' + LZString.compressToEncodedURIComponent(json);
  }
  return 'LC0.' + btoa(unescape(encodeURIComponent(json)));
}

function decode(str) {
  const code = cleanCode(str);
  try {
    if (code.startsWith('LC1.')) {
      if (!window.LZString) return null;
      const json = LZString.decompressFromEncodedURIComponent(code.slice(4));
      return JSON.parse(json);
    }
    if (code.startsWith('LC0.')) {
      return JSON.parse(decodeURIComponent(escape(atob(code.slice(4)))));
    }
    // 兼容你上一版没有 LC 前缀的旧码
    return JSON.parse(decodeURIComponent(escape(atob(code))));
  } catch {
    return null;
  }
}

function setCode(elId, lenId, code, label) {
  document.getElementById(elId).textContent = code;
  const lenEl = document.getElementById(lenId);
  if (lenEl) {
    const mode = document.getElementById('compatMode')?.checked ? '兼容网络模式，码会更长' : '短码优先模式';
    lenEl.textContent = `${label}长度：${code.length} 个字符｜${mode}`;
  }
}

function copyText(text, label) {
  const t = cleanCode(text);
  if (!t || t.includes('生成中')) { toast(`${label}还没生成`); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(() => toast(`✓ ${label}已复制`)).catch(() => fallbackCopy(t, label));
  } else { fallbackCopy(t, label); }
}
function fallbackCopy(text, label) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); toast(`✓ ${label}已复制`); }
  catch { toast('请长按手动复制'); }
  document.body.removeChild(ta);
}


function showAnswerCallPanel(code) {
  const panel = document.getElementById('answerCallPanel');
  const text = document.getElementById('answerCallText');
  if (!panel || !text) return;
  text.value = cleanCode(code);
  panel.classList.add('open');
  document.getElementById('copyAnswerCallBtn').style.display = 'block';
}

function hideAnswerCallPanel() {
  document.getElementById('answerCallPanel')?.classList.remove('open');
}

function selectAnswerCallText() {
  const text = document.getElementById('answerCallText');
  if (!text) return;
  text.focus();
  text.select();
  if (text.setSelectionRange) text.setSelectionRange(0, text.value.length);
  toast('已选中确认码，长按可复制');
}

function showConnecting(msg) {
  document.getElementById('connectingMsg').textContent = msg || '正在连接…';
  document.getElementById('connectingOverlay').classList.remove('hidden');
}

function markConnected() {
  document.getElementById('connectingOverlay').classList.add('hidden');
  // 不自动隐藏确认码面板，避免接收方还没复制就看不到。
  if (!callStartTime) startTimer();
}

function rebuildLocalStream(videoTrack) {
  const audioTrack = rawStream?.getAudioTracks?.()[0];
  localStream = new MediaStream([videoTrack, audioTrack].filter(Boolean));
  document.getElementById('localVideo').srcObject = localStream;
}

async function getLocalMedia() {
  try {
    if (rawStream && rawStream.getTracks().some(t => t.readyState === 'live')) {
      if (!localStream || !localStream.getVideoTracks().length) rebuildLocalStream(rawStream.getVideoTracks()[0]);
      return true;
    }
    rawStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 960 }, height: { ideal: 540 }, frameRate: { ideal: 24, max: 30 } },
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    rebuildLocalStream(rawStream.getVideoTracks()[0]);
    return true;
  } catch (e) {
    toast('⚠️ 请在浏览器弹窗中允许摄像头和麦克风权限');
    return false;
  }
}

async function gatherICE(statusElId = '', label = '网络信息') {
  const statusEl = statusElId ? document.getElementById(statusElId) : null;
  const compat = document.getElementById('compatMode')?.checked;
  const maxWait = compat ? 16000 : 9000;
  const started = Date.now();
  if (statusEl) statusEl.textContent = `正在收集${label}，请不要切出页面…`;

  return new Promise(res => {
    let done = false;
    const finish = (reason) => {
      if (done) return;
      done = true;
      clearInterval(ticker);
      clearTimeout(limit);
      pc.onicegatheringstatechange = null;
      if (statusEl) {
        const sec = Math.max(1, Math.round((Date.now() - started) / 1000));
        statusEl.textContent = `${label}已生成，用时约 ${sec} 秒。`;
      }
      res(reason);
    };
    const ticker = setInterval(() => {
      if (!statusEl) return;
      const left = Math.max(1, Math.ceil((maxWait - (Date.now() - started)) / 1000));
      statusEl.textContent = `正在收集${label}，最多还需约 ${left} 秒，请不要切出页面…`;
    }, 1000);
    if (pc.iceGatheringState === 'complete') { finish('complete'); return; }
    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === 'complete') finish('complete');
    };
    const limit = setTimeout(() => finish('timeout'), maxWait);
  });
}

function createPC(role) {
  currentRole = role || '';
  if (pc) { pc.close(); pc = null; }
  pc = new RTCPeerConnection({ iceServers: getIceServers() });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  if (role === 'host') {
    chatChannel = pc.createDataChannel('lovechat');
    setupChatChannel(chatChannel);
  } else {
    pc.ondatachannel = e => setupChatChannel(e.channel);
  }

  pc.ontrack = e => {
    const rv = document.getElementById('remoteVideo');
    if (rv.srcObject !== e.streams[0]) rv.srcObject = e.streams[0];
    rv.play?.().catch(() => {});
    markConnected();
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      waitingForHostPaste = false;
      markConnected();
    }
    if (pc.connectionState === 'failed') {
      if (currentRole === 'joiner' && waitingForHostPaste) {
        toast('还在等待发起方粘贴确认码；如果超过 30 秒仍没接通，请两边刷新后重来', 5200);
      } else {
        toast('连接失败：请两边同时勾选“兼容网络模式”，重新生成邀请码和确认码');
      }
    }
    if (pc.connectionState === 'disconnected') toast('连接中断，请检查网络');
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
      waitingForHostPaste = false;
      markConnected();
    }
    if (pc.iceConnectionState === 'failed') {
      if (currentRole === 'joiner' && waitingForHostPaste) {
        toast('还在等待发起方粘贴确认码；如果超过 30 秒仍没接通，请两边刷新后重来', 5200);
      } else {
        toast('连接失败：请两边同时勾选“兼容网络模式”，重新生成邀请码和确认码');
      }
    }
  };
}

function replaceOutgoingVideo(track) {
  if (!pc || !track) return;
  const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
  if (sender) sender.replaceTrack(track).catch(() => toast('切换视频效果失败'));
}

function startTimer() {
  callStartTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - callStartTime) / 1000);
    document.getElementById('callTimer').textContent =
      `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
}

function resetChat() {
  chatChannel = null; unreadChat = 0;
  document.getElementById('chatBadge').classList.remove('show');
  document.getElementById('chatPanel').classList.remove('open');
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chatInput').value = '';
  document.getElementById('chatInput').disabled = true;
  document.getElementById('chatSendBtn').disabled = true;
}

function stopBeauty() {
  beautyEnabled = false;
  if (beautyFrame) cancelAnimationFrame(beautyFrame);
  beautyFrame = null;
  if (beautyVideoTrack) { try { beautyVideoTrack.stop(); } catch {} }
  beautyVideoTrack = null;
  if (rawStream?.getVideoTracks?.()[0]) {
    rebuildLocalStream(rawStream.getVideoTracks()[0]);
    replaceOutgoingVideo(rawStream.getVideoTracks()[0]);
  }
  document.getElementById('localVideo').style.filter = '';
  document.getElementById('beautyBtn').classList.remove('muted');
  document.getElementById('beautyBtn').textContent = '✨';
}

function hangup() {
  clearInterval(timerInterval); timerInterval = null; callStartTime = null;
  if (pc) { pc.close(); pc = null; }
  if (beautyFrame) cancelAnimationFrame(beautyFrame);
  if (beautyVideoTrack) { try { beautyVideoTrack.stop(); } catch {} }
  beautyVideoTrack = null; beautyEnabled = false;
  if (rawStream) { rawStream.getTracks().forEach(t => t.stop()); rawStream = null; }
  if (localStream) { localStream.getTracks().forEach(t => { if (t.readyState !== 'ended') t.stop(); }); localStream = null; }
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('beautySource').srcObject = null;
  hostSessionId = null; joinSessionId = null; answerAlreadyUsed = false;
  pendingAnswerCode = ''; currentRole = ''; waitingForHostPaste = false;
  muted = false; camOff = false;
  resetChat();
  ['step1host','step1joiner'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('step0').style.display = 'flex';
  document.getElementById('answerArea').style.display = 'none';
  hideAnswerCallPanel();
  const answerCallTextEl = document.getElementById('answerCallText');
  if (answerCallTextEl) answerCallTextEl.value = '';
  const answerTextEl = document.getElementById('answerText');
  if (answerTextEl) answerTextEl.textContent = '';
  document.getElementById('offerInput').value = '';
  document.getElementById('answerInput').value = '';
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('connectBtn').style.opacity = '1';
  document.getElementById('beautyBtn').classList.remove('muted');
  document.getElementById('beautyBtn').textContent = '✨';
  document.getElementById('muteBtn').textContent = '🎙️';
  document.getElementById('camBtn').textContent = '📷';
  document.getElementById('muteBtn').classList.remove('muted');
  document.getElementById('camBtn').classList.remove('muted');
  showScreen('lobby');
  toast('通话已结束 💔');
}

// ═══════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════
function setupChatChannel(dc) {
  chatChannel = dc;
  dc.onopen = () => {
    document.getElementById('chatInput').disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
    appendChat('system', '文字聊天已连接');
  };
  dc.onclose = () => appendChat('system', '文字聊天已断开');
  dc.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'chat') appendChat('peer', msg.text);
    } catch {
      appendChat('peer', String(e.data || ''));
    }
  };
}

function appendChat(who, text) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = who === 'me' ? 'chat-msg me' : who === 'system' ? 'chat-msg system' : 'chat-msg';
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  if (who === 'peer' && !document.getElementById('chatPanel').classList.contains('open')) {
    unreadChat++;
    document.getElementById('chatBadge').classList.add('show');
  }
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  if (!chatChannel || chatChannel.readyState !== 'open') { toast('文字聊天还没连接好'); return; }
  chatChannel.send(JSON.stringify({ type: 'chat', text, t: Date.now() }));
  appendChat('me', text);
  input.value = '';
}

// ═══════════════════════════════════════════════════════
//  BEAUTY: 轻量 Canvas 美颜，不跑人脸识别，尽量减少发热
// ═══════════════════════════════════════════════════════
async function toggleBeauty() {
  if (!rawStream) { toast('先进入通话或先允许摄像头'); return; }
  if (beautyEnabled) { stopBeauty(); toast('已关闭轻美颜'); return; }

  const rawTrack = rawStream.getVideoTracks()[0];
  const canvas = document.getElementById('beautyCanvas');
  const source = document.getElementById('beautySource');
  const ctx = canvas.getContext('2d', { alpha: false });

  if (!canvas.captureStream || !ctx) {
    document.getElementById('localVideo').style.filter = 'brightness(1.07) contrast(1.03) saturate(1.08) blur(0.35px)';
    beautyEnabled = true;
    document.getElementById('beautyBtn').classList.add('muted');
    document.getElementById('beautyBtn').textContent = '✨✓';
    toast('当前浏览器只支持本地预览轻美颜');
    return;
  }

  const s = rawTrack.getSettings ? rawTrack.getSettings() : {};
  canvas.width = Math.min(640, s.width || 640);
  canvas.height = Math.min(480, s.height || 480);
  source.srcObject = rawStream;
  await source.play().catch(() => {});

  beautyEnabled = true;
  let last = 0;
  const draw = (ts) => {
    if (!beautyEnabled) return;
    if (ts - last > 50) { // 约 20fps，降低手机发热
      last = ts;
      ctx.save();
      ctx.filter = 'brightness(1.07) contrast(1.025) saturate(1.08) blur(0.45px)';
      ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
    beautyFrame = requestAnimationFrame(draw);
  };
  beautyFrame = requestAnimationFrame(draw);

  beautyVideoTrack = canvas.captureStream(20).getVideoTracks()[0];
  if (camOff) beautyVideoTrack.enabled = false;
  rebuildLocalStream(beautyVideoTrack);
  replaceOutgoingVideo(beautyVideoTrack);
  document.getElementById('beautyBtn').classList.add('muted');
  document.getElementById('beautyBtn').textContent = '✨✓';
  toast('已开启轻美颜');
}

// ═══════════════════════════════════════════════════════
//  LOBBY — 角色选择
// ═══════════════════════════════════════════════════════
document.getElementById('createBtn').addEventListener('click', async () => {
  if (!await getLocalMedia()) return;
  document.getElementById('step0').style.display = 'none';
  document.getElementById('step1host').style.display = 'flex';
  document.getElementById('offerText').textContent = '正在生成邀请码，请稍候…';
  document.getElementById('offerLen').textContent = '正在计算长度…';
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('connectBtn').style.opacity = '1';
  answerAlreadyUsed = false;
  hostSessionId = randomId();

  createPC('host');
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await gatherICE('offerLen', '邀请码');

  const code = encode({ v: 2, type: 'offer', sessionId: hostSessionId, name: getName(), sdp: pc.localDescription });
  setCode('offerText', 'offerLen', code, '邀请码');
});

document.getElementById('copyOfferBtn').addEventListener('click', () => {
  copyText(document.getElementById('offerText').textContent, '邀请码');
});

// 主机：粘贴确认码 → 建立连接，并锁定为两人通话
document.getElementById('connectBtn').addEventListener('click', async () => {
  if (answerAlreadyUsed) { toast('这个邀请已经锁定，不能再接入第三个人'); return; }
  const raw = document.getElementById('answerInput').value.trim();
  if (!raw) { toast('请先粘贴对方的确认码'); return; }
  const parsed = decode(raw);
  if (!parsed?.sdp || parsed.type !== 'answer') { toast('确认码格式不对，请重新复制'); return; }
  if (parsed.sessionId !== hostSessionId) { toast('确认码不属于这个邀请，已拒绝'); return; }

  try {
    showScreen('callscreen');
    showConnecting('连接中，等待视频建立…');
    await pc.setRemoteDescription(new RTCSessionDescription(parsed.sdp));
    document.getElementById('peerNameDisplay').textContent = parsed.name || '对方';
    answerAlreadyUsed = true;
    document.getElementById('connectBtn').disabled = true;
    document.getElementById('connectBtn').style.opacity = '0.55';
    toast('已锁定两人通话');
  } catch(e) {
    toast('连接失败，请确认对方的确认码是否完整');
  }
});

// ═══════════════════════════════════════════════════════
//  接入方流程
// ═══════════════════════════════════════════════════════
document.getElementById('joinStartBtn').addEventListener('click', () => {
  document.getElementById('step0').style.display = 'none';
  document.getElementById('step1joiner').style.display = 'flex';
});

document.getElementById('genAnswerBtn').addEventListener('click', async () => {
  const raw = document.getElementById('offerInput').value.trim();
  if (!raw) { toast('请先粘贴邀请码'); return; }
  const parsed = decode(raw);
  if (!parsed?.sdp || parsed.type !== 'offer') { toast('邀请码格式不对，请重新复制'); return; }

  document.getElementById('answerArea').style.display = 'flex';
  document.getElementById('answerText').textContent = '正在生成确认码，请等到这里出现一长串文字后再复制…';
  document.getElementById('answerLen').textContent = '正在准备摄像头和麦克风权限…';
  document.getElementById('genAnswerBtn').disabled = true;
  document.getElementById('genAnswerBtn').style.opacity = '0.55';

  try {
    if (!await getLocalMedia()) return;
    joinSessionId = parsed.sessionId;
    document.getElementById('peerNameDisplay').textContent = parsed.name || '对方';

    createPC('joiner');
    await pc.setRemoteDescription(new RTCSessionDescription(parsed.sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await gatherICE('answerLen', '确认码');

    const code = encode({ v: 2, type: 'answer', sessionId: joinSessionId, name: getName(), sdp: pc.localDescription });
    pendingAnswerCode = code;
    setCode('answerText', 'answerLen', code, '确认码');
    document.getElementById('copyAnswerCallBtn').onclick = () => copyText(code, '确认码');
    toast('确认码已生成，先复制发给对方，不要急着关页面', 4200);
  } catch(e) {
    console.error(e);
    toast('生成确认码失败：请确认邀请码完整，或两边刷新后重来', 5200);
  } finally {
    document.getElementById('genAnswerBtn').disabled = false;
    document.getElementById('genAnswerBtn').style.opacity = '1';
  }
});

// 接入方：确认码发回给发起方后，再进入等待通话页
function enterJoinerWaitingScreen() {
  const code = pendingAnswerCode || document.getElementById('answerText')?.textContent || '';
  if (!cleanCode(code) || cleanCode(code).includes('正在')) {
    toast('确认码还没生成，请先生成并复制确认码');
    return;
  }
  waitingForHostPaste = true;
  showScreen('callscreen');
  showConnecting('已生成确认码。请确认你已经发给对方，正在等待发起方粘贴…');
  showAnswerCallPanel(code);
  document.getElementById('copyAnswerCallBtn').style.display = 'block';
  document.getElementById('copyAnswerCallBtn').onclick = () => copyText(code, '确认码');
  if (document.getElementById('remoteVideo').srcObject || pc?.connectionState === 'connected') markConnected();
}

document.getElementById('waitAfterAnswerBtn').addEventListener('click', enterJoinerWaitingScreen);
document.getElementById('regenAnswerBtn').addEventListener('click', () => {
  if (pc) { try { pc.close(); } catch {} pc = null; }
  pendingAnswerCode = '';
  waitingForHostPaste = false;
  document.getElementById('answerArea').style.display = 'none';
  document.getElementById('answerText').textContent = '';
  document.getElementById('answerLen').textContent = '正在计算长度…';
  document.getElementById('genAnswerBtn').click();
});

document.getElementById('copyAnswerBtn').addEventListener('click', () => {
  copyText(document.getElementById('answerText').textContent, '确认码');
});

document.getElementById('copyAnswerCallBtn').addEventListener('click', () => {
  copyText(document.getElementById('answerText').textContent || document.getElementById('answerCallText')?.value || '', '确认码');
});

document.getElementById('answerCallCopyBtn')?.addEventListener('click', () => {
  copyText(document.getElementById('answerCallText')?.value || document.getElementById('answerText')?.textContent || '', '确认码');
});
document.getElementById('answerCallSelectBtn')?.addEventListener('click', selectAnswerCallText);
document.getElementById('answerCallCloseBtn')?.addEventListener('click', hideAnswerCallPanel);


// ═══════════════════════════════════════════════════════
//  CALL CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById('hangupBtn').addEventListener('click', hangup);
document.getElementById('beautyBtn').addEventListener('click', toggleBeauty);

document.getElementById('muteBtn').addEventListener('click', () => {
  if (!rawStream) return;
  muted = !muted;
  rawStream.getAudioTracks().forEach(t => t.enabled = !muted);
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🎙️';
  document.getElementById('muteBtn').classList.toggle('muted', muted);
  toast(muted ? '已静音' : '已取消静音');
});

document.getElementById('camBtn').addEventListener('click', () => {
  if (!rawStream) return;
  camOff = !camOff;
  rawStream.getVideoTracks().forEach(t => t.enabled = !camOff);
  if (beautyVideoTrack) beautyVideoTrack.enabled = !camOff;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = !camOff);
  document.getElementById('camBtn').textContent = camOff ? '🚫' : '📷';
  document.getElementById('camBtn').classList.toggle('muted', camOff);
  toast(camOff ? '摄像头已关闭' : '摄像头已开启');
});

document.getElementById('chatBtn').addEventListener('click', () => {
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    unreadChat = 0;
    document.getElementById('chatBadge').classList.remove('show');
    setTimeout(() => document.getElementById('chatInput').focus(), 80);
  }
});

document.getElementById('chatCloseBtn').addEventListener('click', () => {
  document.getElementById('chatPanel').classList.remove('open');
});
document.getElementById('chatSendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});
</script>
