<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LoveCall 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --rose:    #e8a0b4;
    --blush:   #f2c4ce;
    --deep:    #1a0a10;
    --mid:     #2d1520;
    --surface: rgba(255,255,255,0.06);
    --border:  rgba(232,160,180,0.25);
    --glow:    rgba(232,160,180,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: var(--deep);
    color: #f0dde4;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* animated gradient background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,40,70,0.55) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(80,20,50,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 55% 45%, rgba(160,60,100,0.2) 0%, transparent 55%);
    animation: bgpulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgpulse {
    0%   { opacity: 0.8; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.04); }
  }

  /* floating particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .p {
    position: absolute; border-radius: 50%;
    background: var(--rose); opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ── LOBBY ── */
  #lobby { gap: 32px; }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 4.2rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: #f7e0e8;
    text-shadow: 0 0 40px rgba(232,160,180,0.5);
    animation: logofade 1.2s ease forwards;
  }
  .logo span { font-style: italic; color: var(--rose); }
  @keyframes logofade {
    from { opacity:0; transform: translateY(-16px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .tagline {
    font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(232,160,180,0.6); margin-top: -20px;
    animation: logofade 1.2s 0.3s ease both;
  }

  .card {
    background: var(--surface);
    backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 16px;
    animation: logofade 1.2s 0.5s ease both;
    box-shadow: 0 8px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .card label {
    font-size: 0.72rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--rose); margin-bottom: 4px;
  }

  .input-group { display: flex; flex-direction: column; gap: 6px; }

  input[type=text] {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #f0dde4;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    width: 100%;
  }
  input[type=text]::placeholder { color: rgba(240,221,228,0.3); }
  input[type=text]:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .row { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    padding: 13px 20px;
    border-radius: 12px;
    border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: linear-gradient(135deg, #c0516e 0%, #e8789a 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(192,81,110,0.45);
  }
  .btn-primary:hover { box-shadow: 0 6px 28px rgba(192,81,110,0.65); }
  .btn-secondary {
    background: rgba(255,255,255,0.07);
    color: var(--blush);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    color: rgba(240,221,228,0.25); font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background: var(--border);
  }

  .room-display {
    background: rgba(232,160,180,0.08);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem; color: var(--blush);
    letter-spacing: 0.06em; text-align: center;
    word-break: break-all;
  }

  /* ── CALL SCREEN ── */
  #callscreen {
    padding: 0; background: #0d0608;
    flex-direction: column;
    justify-content: flex-end;
  }

  #remoteVideo {
    position: absolute; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #0d0608;
    transition: opacity 0.5s;
  }

  #localVideo {
    position: absolute;
    bottom: 100px; right: 20px;
    z-index: 20;
    width: clamp(100px, 28vw, 150px);
    aspect-ratio: 3/4;
    border-radius: 16px;
    object-fit: cover;
    border: 2px solid rgba(232,160,180,0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: scaleX(-1);
    transition: all 0.3s;
  }
  #localVideo:hover { transform: scaleX(-1) scale(1.04); }

  .call-overlay {
    position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: linear-gradient(to top, rgba(10,3,7,0.9) 0%, transparent 40%);
  }

  .call-controls {
    position: relative; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    gap: 20px;
    padding: 20px 20px 36px;
  }

  .ctrl-btn {
    width: 56px; height: 56px;
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    transition: transform 0.15s, box-shadow 0.2s;
    backdrop-filter: blur(8px);
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn.normal {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
  }
  .ctrl-btn.normal:hover { background: rgba(255,255,255,0.2); }
  .ctrl-btn.end {
    background: linear-gradient(135deg, #c0516e, #e8789a);
    box-shadow: 0 4px 20px rgba(192,81,110,0.5);
    color: #fff; width: 66px; height: 66px; font-size: 1.5rem;
  }
  .ctrl-btn.end:hover { box-shadow: 0 6px 28px rgba(192,81,110,0.7); }
  .ctrl-btn.muted { background: rgba(232,160,180,0.35); }

  .status-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(10,3,7,0.7), transparent);
  }
  .status-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 300; color: #f0dde4;
  }
  .status-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: rgba(240,221,228,0.6);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6fcf97; animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(111,207,151,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 5px rgba(111,207,151,0); }
  }

  /* connecting state */
  .connecting-overlay {
    position: absolute; inset: 0; z-index: 25;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    background: rgba(10,3,7,0.88);
    backdrop-filter: blur(6px);
    transition: opacity 0.5s;
  }
  .connecting-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--rose);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .connecting-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-style: italic;
    color: var(--blush);
  }

  /* toast */
  #toast {
    position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
    z-index: 100; padding: 10px 20px;
    background: rgba(20,8,14,0.9); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 30px;
    color: var(--blush); font-size: 0.82rem; letter-spacing: 0.05em;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* copy btn for room id */
  .copy-wrap { display: flex; gap: 8px; align-items: center; }
  .copy-wrap .room-display { flex: 1; text-align: left; }
  .copy-icon-btn {
    flex-shrink: 0;
    background: rgba(232,160,180,0.12);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--rose);
    cursor: pointer; padding: 8px 10px;
    font-size: 1rem; transition: background 0.2s;
  }
  .copy-icon-btn:hover { background: rgba(232,160,180,0.22); }

  /* info text */
  .info { font-size: 0.75rem; color: rgba(240,221,228,0.4); line-height: 1.6; text-align: center; }
  .info a { color: var(--rose); text-decoration: none; }
  .info strong { color: rgba(240,221,228,0.65); }
</style>
</head>
<body>

<!-- particles -->
<div class="particles" id="particles"></div>

<!-- LOBBY -->
<div class="screen" id="lobby">
  <div class="logo">Love<span>Call</span></div>
  <p class="tagline">私密 · 点对点 · 加密视频</p>

  <div class="card">
    <div class="input-group">
      <label>你的昵称</label>
      <input type="text" id="myName" placeholder="例如：宝贝" maxlength="20" value="">
    </div>

    <div class="divider">创建或加入通话</div>

    <button class="btn btn-primary" id="createBtn">✦ 创建新房间</button>

    <div id="createdRoom" style="display:none; flex-direction:column; gap:10px;">
      <label>把这个房间码发给对方 👇</label>
      <div class="copy-wrap">
        <div class="room-display" id="myRoomId">—</div>
        <button class="copy-icon-btn" id="copyBtn" title="复制">⧉</button>
      </div>
      <button class="btn btn-primary" id="waitBtn">📡 等待对方加入…</button>
    </div>

    <div class="divider">or</div>

    <div class="input-group">
      <label>输入房间码加入</label>
      <div class="row">
        <input type="text" id="joinRoomInput" placeholder="粘贴房间码…" style="flex:1">
        <button class="btn btn-primary" id="joinBtn" style="flex:0 0 80px">加入</button>
      </div>
    </div>

    <p class="info">
      <strong>使用说明：</strong>一人创建房间，把房间码发给对方，对方粘贴后加入。<br>
      全程点对点加密，无服务器录像。需要摄像头与麦克风权限。
    </p>
  </div>
</div>

<!-- CALL SCREEN -->
<div class="screen hidden" id="callscreen">
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo"  autoplay playsinline muted></video>
  <div class="call-overlay"></div>

  <div class="connecting-overlay" id="connectingOverlay">
    <div class="spinner"></div>
    <div class="connecting-text">正在连接…</div>
  </div>

  <div class="status-bar">
    <span class="status-name" id="peerNameDisplay">对方</span>
    <span class="status-dot"><span class="dot"></span> <span id="callTimer">00:00</span></span>
  </div>

  <div class="call-controls">
    <button class="ctrl-btn normal" id="muteBtn" title="静音">🎙️</button>
    <button class="ctrl-btn end"    id="hangupBtn" title="挂断">📵</button>
    <button class="ctrl-btn normal" id="camBtn"  title="摄像头">📷</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'p';
  const size = Math.random() * 4 + 2;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    animation-duration:${8 + Math.random()*12}s;
    animation-delay:${Math.random()*10}s;
    opacity:0;
  `;
  particlesEl.appendChild(p);
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function toast(msg, duration = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════
//  SHOW / HIDE SCREENS
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════
//  SIGNALING via BroadcastChannel (same-origin tab) +
//  localStorage polling (cross-device via shared storage server)
//
//  ⚠️  For cross-device use we need a real signaling relay.
//      We use a free public TURN/signaling trick:
//      peer data is stored at a public pastebin-style API.
//      Here we use https://api.jsonbin.io  (free, no auth needed for anonymous bins)
//      OR the simpler approach: localStorage for local testing,
//      with a manual "copy offer/answer" fallback shown below.
// ═══════════════════════════════════════════════════════

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' },
  { urls: 'turn:openrelay.metered.ca:80',   username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443',  username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
];

// ── Signaling backend: jsonbin.io anonymous bins ──
const SIGNAL_BASE = 'https://api.jsonbin.io/v3/b';
const HEADERS = { 'Content-Type': 'application/json' };

async function createBin(data) {
  const r = await fetch(SIGNAL_BASE, {
    method: 'POST',
    headers: { ...HEADERS, 'X-Bin-Private': 'false' },
    body: JSON.stringify(data)
  });
  const j = await r.json();
  return j.metadata.id; // bin ID = room code
}

async function readBin(id) {
  const r = await fetch(`${SIGNAL_BASE}/${id}/latest`, { headers: HEADERS });
  if (!r.ok) return null;
  const j = await r.json();
  return j.record;
}

async function updateBin(id, data) {
  await fetch(`${SIGNAL_BASE}/${id}`, {
    method: 'PUT',
    headers: HEADERS,
    body: JSON.stringify(data)
  });
}

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let pc = null;
let localStream = null;
let roomId = null;
let isHost = false;
let callStartTime = null;
let timerInterval = null;
let pollInterval = null;
let muted = false;
let camOff = false;

// ─── GET MEDIA ───────────────────────────────────────
async function getLocalMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: true, noiseSuppression: true }
    });
    document.getElementById('localVideo').srcObject = localStream;
    return true;
  } catch (e) {
    toast('⚠️ 无法获取摄像头/麦克风权限，请在浏览器设置中允许。');
    return false;
  }
}

// ─── CREATE PC ───────────────────────────────────────
function createPeerConnection() {
  if (pc) { pc.close(); pc = null; }
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    document.getElementById('remoteVideo').srcObject = e.streams[0];
    document.getElementById('connectingOverlay').classList.add('hidden');
    startTimer();
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      toast('连接断开，请检查网络。');
    }
  };

  return pc;
}

// ─── CALL TIMER ─────────────────────────────────────
function startTimer() {
  callStartTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - callStartTime) / 1000);
    const m = Math.floor(s / 60).toString().padStart(2,'0');
    const sec = (s % 60).toString().padStart(2,'0');
    document.getElementById('callTimer').textContent = `${m}:${sec}`;
  }, 1000);
}

// ─── HANGUP ─────────────────────────────────────────
function hangup() {
  clearInterval(timerInterval);
  clearInterval(pollInterval);
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localVideo').srcObject = null;
  roomId = null; isHost = false;
  document.getElementById('createdRoom').style.display = 'none';
  document.getElementById('myRoomId').textContent = '—';
  showScreen('lobby');
  toast('通话已结束 💔');
}

// ═══════════════════════════════════════════════════════
//  HOST FLOW
// ═══════════════════════════════════════════════════════
document.getElementById('createBtn').addEventListener('click', async () => {
  const name = document.getElementById('myName').value.trim() || '宝贝';
  if (!await getLocalMedia()) return;

  // 1. Create PC & offer
  createPeerConnection();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // 2. Wait for all ICE candidates
  await new Promise(res => {
    if (pc.iceGatheringState === 'complete') { res(); return; }
    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') res(); };
    setTimeout(res, 4000); // fallback
  });

  // 3. Store offer in bin → get room ID
  try {
    const binId = await createBin({ offer: pc.localDescription, offerName: name, answer: null });
    roomId = binId;
    isHost = true;

    document.getElementById('myRoomId').textContent = roomId;
    document.getElementById('createdRoom').style.display = 'flex';
    document.getElementById('createBtn').style.display = 'none';

    showScreen('callscreen');
    document.getElementById('connectingOverlay').classList.remove('hidden');
    document.getElementById('peerNameDisplay').textContent = '等待对方…';

    // Poll for answer
    pollInterval = setInterval(async () => {
      const data = await readBin(roomId);
      if (data && data.answer) {
        clearInterval(pollInterval);
        document.getElementById('peerNameDisplay').textContent = data.answerName || '对方';
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      }
    }, 2500);

  } catch(e) {
    toast('创建房间失败，请检查网络连接。');
    hangup();
  }
});

// ─── WAIT BTN (copy room id again) ─────────────────
document.getElementById('waitBtn').addEventListener('click', () => {
  if (roomId) {
    navigator.clipboard?.writeText(roomId).catch(()=>{});
    toast('房间码已复制！发给对方吧 💌');
  }
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const id = document.getElementById('myRoomId').textContent;
  if (id && id !== '—') {
    navigator.clipboard?.writeText(id)
      .then(() => toast('✓ 房间码已复制'))
      .catch(() => toast('请手动复制：' + id));
  }
});

// ═══════════════════════════════════════════════════════
//  JOINER FLOW
// ═══════════════════════════════════════════════════════
document.getElementById('joinBtn').addEventListener('click', async () => {
  const rid = document.getElementById('joinRoomInput').value.trim();
  const name = document.getElementById('myName').value.trim() || '宝贝';
  if (!rid) { toast('请先输入房间码'); return; }
  if (!await getLocalMedia()) return;

  showScreen('callscreen');
  document.getElementById('connectingOverlay').classList.remove('hidden');

  try {
    const data = await readBin(rid);
    if (!data || !data.offer) { toast('房间码无效或已过期'); hangup(); return; }

    document.getElementById('peerNameDisplay').textContent = data.offerName || '对方';
    roomId = rid;

    createPeerConnection();
    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    // Wait for ICE
    await new Promise(res => {
      if (pc.iceGatheringState === 'complete') { res(); return; }
      pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') res(); };
      setTimeout(res, 4000);
    });

    await updateBin(rid, { ...data, answer: pc.localDescription, answerName: name });
    toast('✓ 已发送连接请求，等待建立…');

  } catch(e) {
    toast('连接失败，请检查房间码或网络。');
    hangup();
  }
});

// ═══════════════════════════════════════════════════════
//  CALL CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById('hangupBtn').addEventListener('click', hangup);

document.getElementById('muteBtn').addEventListener('click', () => {
  if (!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🎙️';
  document.getElementById('muteBtn').classList.toggle('muted', muted);
  toast(muted ? '已静音' : '已取消静音');
});

document.getElementById('camBtn').addEventListener('click', () => {
  if (!localStream) return;
  camOff = !camOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !camOff);
  document.getElementById('camBtn').textContent = camOff ? '🚫' : '📷';
  document.getElementById('camBtn').classList.toggle('muted', camOff);
  toast(camOff ? '摄像头已关闭' : '摄像头已开启');
});

// ═══════════════════════════════════════════════════════
//  ENTER KEY support
// ═══════════════════════════════════════════════════════
document.getElementById('joinRoomInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('joinBtn').click();
});
</script>
